rules:
  action-setup:
    status: exempt
    comment: No custom actions are registered by the integration.
  appropriate-polling:
    status: done
    comment: coordinator.py sets SCAN_INTERVAL = timedelta(hours=1).
  action-exceptions:
    status: exempt
    comment: No custom actions exist, so there are no action exceptions to document.
  brands: todo
  common-modules:
    status: done
    comment: Code is split into coordinator.py, config_flow.py, sensor.py, and diagnostics.py.
  config-entry-unloading:
    status: done
    comment: __init__.py implements async_unload_entry for entry cleanup.
  config-flow:
    status: done
    comment: config_flow.py defines ElectricIrelandInsightsConfigFlow.
  config-flow-test-coverage:
    status: done
    comment: tests/test_config_flow.py contains 7+ config flow tests.
  dependency-transparency:
    status: done
    comment: manifest.json only adds beautifulsoup4; HTTP uses HA aiohttp.
  devices:
    status: done
    comment: sensor.py defines DeviceInfo with identifiers, name, and entry_type.
  diagnostics:
    status: done
    comment: diagnostics.py implements async_get_config_entry_diagnostics.
  discovery:
    status: exempt
    comment: Cloud-backed integration with no local discovery mechanism.
  discovery-update-info:
    status: exempt
    comment: No local host/IP discovery data exists to update.
  docs-actions:
    status: exempt
    comment: No custom actions are exposed.
  docs-configuration-parameters: todo
  docs-data-update: todo
  docs-examples: todo
  docs-high-level-description: todo
  docs-installation-instructions: todo
  docs-installation-parameters:
    status: done
    comment: T12 created docs for installation parameters.
  docs-known-limitations: todo
  docs-removal-instructions:
    status: done
    comment: T12 created docs for removal instructions.
  docs-supported-devices:
    status: exempt
    comment: Service-style integration is not device-specific.
  docs-supported-functions: todo
  docs-troubleshooting:
    status: done
    comment: T12 created docs for troubleshooting.
  docs-use-cases: todo
  dynamic-devices:
    status: exempt
    comment: Each config entry maps to a single static device.
  async-dependency:
    status: done
    comment: The integration uses aiohttp/async APIs throughout instead of blocking IO.
  entity-category:
    status: done
    comment: sensor.py sets EntityCategory.DIAGNOSTIC on entities.
  entity-device-class:
    status: done
    comment: sensor.py uses SensorDeviceClass.TIMESTAMP for last_import_time.
  entity-disabled-by-default:
    status: done
    comment: sensor.py disables diagnostic entities by default.
  entity-event-setup:
    status: exempt
    comment: No event-based entities are implemented.
  entity-unique-id:
    status: done
    comment: sensor.py builds unique_id from domain, account, and key.
  entity-translations:
    status: done
    comment: strings.json includes entity translation entries.
  entity-unavailable:
    status: done
    comment: CoordinatorEntity.available returns coordinator.last_update_success.
  exception-translations: todo
  has-entity-name:
    status: done
    comment: ElectricIrelandDiagnosticSensor sets _attr_has_entity_name = True.
  icon-translations: todo
  integration-owner: todo
  inject-websession:
    status: done
    comment: config_flow.py and coordinator.py create HA client sessions with async_create_clientsession(hass, cookie_jar=...).
  log-when-unavailable:
    status: done
    comment: T7 added state transition logging in coordinator.py.
  parallel-updates:
    status: done
    comment: sensor.py sets PARALLEL_UPDATES = 0.
  reauthentication-flow:
    status: done
    comment: config_flow.py implements async_step_reauth and async_step_reauth_confirm.
  reconfiguration-flow:
    status: done
    comment: T8 added reconfigure flow in config_flow.py.
  repair-issues: todo
  runtime-data:
    status: done
    comment: __init__.py assigns entry.runtime_data = coordinator.
  strict-typing:
    status: done
    comment: T11 added mypy strict type checking.
  stale-devices:
    status: exempt
    comment: The integration does not create or manage dynamic device lifecycles.
  test-before-configure:
    status: done
    comment: config_flow.py validates credentials before creating the config entry.
  test-before-setup:
    status: done
    comment: __init__.py validates credentials in async_setup_entry before finishing setup.
  test-coverage: todo
  unique-config-entry:
    status: done
    comment: config_flow.py calls async_set_unique_id(account_number) and aborts duplicates.
